# Paste inside your SSL VirtualHost for rattelapp.com if .htaccess is ignored (AllowOverride None).
# Adjust DocumentRoot to your real dist path, then: sudo a2ensite ... && sudo systemctl reload apache2
#
# DocumentRoot MUST point to the folder that contains index.html and assets/ (Vite dist output).

<Directory /var/www/rattelapp.com>
    Options -Indexes +FollowSymLinks -MultiViews
    AllowOverride All
    Require all granted

    <IfModule mod_rewrite.c>
        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.html [L]
    </IfModule>
</Directory>

# If you must keep AllowOverride None, duplicate the <IfModule mod_rewrite.c> block here
# and set AllowOverride None — the rules above still run from the main config.
