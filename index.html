<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tarteel – ترتيل | منصة حفظ القرآن الكريم</title>
    
    <!-- Google Fonts - Alexandria for Arabic & Inter for English -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@100;200;300;400;500;600;700;800;900&family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Meta Tags for Islamic Educational Platform -->
    <meta name="description" content="منصة ترتيل لحفظ القرآن الكريم - تعلم وحفظ القرآن الكريم مع أفضل المشايخ والمدرسين المعتمدين">
    <meta name="keywords" content="قرآن، حفظ، ترتيل، تجويد، تعلم، إسلام، مشايخ، معلمين">
    <meta name="author" content="Tarteel Platform">
    <meta name="theme-color" content="#1a5f3f">
    
    <script>
      (function() {
        var key = 'dashboard-theme';
        var stored = localStorage.getItem(key);
        var theme = (stored === 'dark' || stored === 'light') ? stored : 'light';
        document.documentElement.classList.remove('light', 'dark');
        document.documentElement.classList.add(theme);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
